name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile Python sources
        run: python -m compileall src tests

      - name: Run unit test suite
        run: PYTHONPATH=src python -m unittest discover -s tests

  docker-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Write default environment file
        run: cp .env.example .env

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Start Docker Compose stack
        run: docker compose up --build -d

      - name: Wait for app healthcheck
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Verify public app surfaces
        run: |
          curl -fsS http://127.0.0.1:8000/ > /tmp/workbench-home.html
          grep -q "Data Workbench" /tmp/workbench-home.html
          curl -fsS http://127.0.0.1:8000/api/source-of-truth > /tmp/workbench-source-of-truth.json
          python -c "import json; data=json.load(open('/tmp/workbench-source-of-truth.json')); source=data['source_of_truth']; assert source['contract']['default_runtime_mode']=='docker-compose'; assert '/api/source-of-truth' in source['contract']['supported_endpoints']"

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down -v

  browser-e2e:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[e2e]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: .playwright-browsers
          key: ${{ runner.os }}-playwright-${{ hashFiles('pyproject.toml') }}

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Run browser E2E tests
        run: PYTHONPATH=src python -m unittest discover -s tests -p 'test_e2e_browser.py'

  persistence-integration:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: workbench
          POSTGRES_USER: workbench
          POSTGRES_PASSWORD: workbench
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workbench -d workbench"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      WORKBENCH_POSTGRES_DSN: postgresql://workbench:workbench@127.0.0.1:5432/workbench
      WORKBENCH_OBJECT_STORE_BACKEND: minio
      WORKBENCH_MINIO_ENDPOINT: 127.0.0.1:9000
      WORKBENCH_MINIO_ACCESS_KEY: workbench
      WORKBENCH_MINIO_SECRET_KEY: workbench123
      WORKBENCH_MINIO_BUCKET: workbench-artifacts
      WORKBENCH_MINIO_SECURE: "0"
      WORKBENCH_RUN_PERSISTENCE_INTEGRATION: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[persistence]"

      - name: Start MinIO
        run: |
          docker run -d --name workbench-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=workbench \
            -e MINIO_ROOT_PASSWORD=workbench123 \
            minio/minio server /data

      - name: Wait for MinIO
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs workbench-minio
          exit 1

      - name: Run persistence integration tests
        run: PYTHONPATH=src python -m unittest discover -s tests -p 'test_persistence_integration.py'
