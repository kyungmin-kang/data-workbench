services:
  app:
    build:
      context: .
    command: python -m workbench.app
    environment:
      PYTHONPATH: /app/src
      WORKBENCH_HOST: 0.0.0.0
      WORKBENCH_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - minio

  worker:
    build:
      context: .
    command: python -m workbench.worker
    environment:
      PYTHONPATH: /app/src
      WORKBENCH_AUTO_PROFILE: "0"
      WORKBENCH_WORKER_INTERVAL: "30"
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workbench
      POSTGRES_USER: workbench
      POSTGRES_PASSWORD: workbench
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: workbench
      MINIO_ROOT_PASSWORD: workbench123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:

