services:
  app:
    build:
      context: .
    command: python -m workbench.app
    environment:
      PYTHONPATH: /app/src
      WORKBENCH_HOST: 0.0.0.0
      WORKBENCH_PORT: 8000
      WORKBENCH_PERSISTENCE_BACKEND: mirror
      WORKBENCH_POSTGRES_DSN: postgresql://workbench:workbench@postgres:5432/workbench
      WORKBENCH_OBJECT_STORE_BACKEND: minio
      WORKBENCH_MINIO_ENDPOINT: minio:9000
      WORKBENCH_MINIO_ACCESS_KEY: workbench
      WORKBENCH_MINIO_SECRET_KEY: workbench123
      WORKBENCH_MINIO_BUCKET: workbench-artifacts
      WORKBENCH_MINIO_SECURE: "0"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      - minio

  worker:
    build:
      context: .
    command: python -m workbench.worker
    environment:
      PYTHONPATH: /app/src
      WORKBENCH_AUTO_PROFILE: "0"
      WORKBENCH_WORKER_INTERVAL: "30"
      WORKBENCH_PERSISTENCE_BACKEND: mirror
      WORKBENCH_POSTGRES_DSN: postgresql://workbench:workbench@postgres:5432/workbench
      WORKBENCH_OBJECT_STORE_BACKEND: minio
      WORKBENCH_MINIO_ENDPOINT: minio:9000
      WORKBENCH_MINIO_ACCESS_KEY: workbench
      WORKBENCH_MINIO_SECRET_KEY: workbench123
      WORKBENCH_MINIO_BUCKET: workbench-artifacts
      WORKBENCH_MINIO_SECURE: "0"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workbench
      POSTGRES_USER: workbench
      POSTGRES_PASSWORD: workbench
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workbench -d workbench"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: workbench
      MINIO_ROOT_PASSWORD: workbench123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
