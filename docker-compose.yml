services:
  app:
    build:
      context: .
    command: python -m workbench.app
    environment:
      PYTHONPATH: /app/src
      WORKBENCH_HOST: 0.0.0.0
      WORKBENCH_PORT: 8000
      WORKBENCH_PERSISTENCE_BACKEND: ${WORKBENCH_PERSISTENCE_BACKEND:-mirror}
      WORKBENCH_POSTGRES_DSN: postgresql://${POSTGRES_USER:-workbench}:${POSTGRES_PASSWORD:-workbench}@postgres:5432/${POSTGRES_DB:-workbench}
      WORKBENCH_OBJECT_STORE_BACKEND: ${WORKBENCH_OBJECT_STORE_BACKEND:-minio}
      WORKBENCH_MINIO_ENDPOINT: ${WORKBENCH_MINIO_ENDPOINT:-minio:9000}
      WORKBENCH_MINIO_ACCESS_KEY: ${WORKBENCH_MINIO_ACCESS_KEY:-workbench}
      WORKBENCH_MINIO_SECRET_KEY: ${WORKBENCH_MINIO_SECRET_KEY:-workbench123}
      WORKBENCH_MINIO_BUCKET: ${WORKBENCH_MINIO_BUCKET:-workbench-artifacts}
      WORKBENCH_MINIO_SECURE: ${WORKBENCH_MINIO_SECURE:-0}
    ports:
      - "${WORKBENCH_PORT:-8000}:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
    command: python -m workbench.worker
    environment:
      PYTHONPATH: /app/src
      WORKBENCH_AUTO_PROFILE: ${WORKBENCH_AUTO_PROFILE:-0}
      WORKBENCH_WORKER_INTERVAL: ${WORKBENCH_WORKER_INTERVAL:-30}
      WORKBENCH_PERSISTENCE_BACKEND: ${WORKBENCH_PERSISTENCE_BACKEND:-mirror}
      WORKBENCH_POSTGRES_DSN: postgresql://${POSTGRES_USER:-workbench}:${POSTGRES_PASSWORD:-workbench}@postgres:5432/${POSTGRES_DB:-workbench}
      WORKBENCH_OBJECT_STORE_BACKEND: ${WORKBENCH_OBJECT_STORE_BACKEND:-minio}
      WORKBENCH_MINIO_ENDPOINT: ${WORKBENCH_MINIO_ENDPOINT:-minio:9000}
      WORKBENCH_MINIO_ACCESS_KEY: ${WORKBENCH_MINIO_ACCESS_KEY:-workbench}
      WORKBENCH_MINIO_SECRET_KEY: ${WORKBENCH_MINIO_SECRET_KEY:-workbench123}
      WORKBENCH_MINIO_BUCKET: ${WORKBENCH_MINIO_BUCKET:-workbench-artifacts}
      WORKBENCH_MINIO_SECURE: ${WORKBENCH_MINIO_SECURE:-0}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workbench}
      POSTGRES_USER: ${POSTGRES_USER:-workbench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workbench}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workbench} -d ${POSTGRES_DB:-workbench}"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-workbench}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-workbench123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
